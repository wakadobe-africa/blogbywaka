on: 
  push: 
    branches: [main]
name: Deploy blogbywaka to infinityfree
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v6.0.2

    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'
      
    - name:  Build Project
      run: |
        npm install
        npm run build
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ftpupload.net
        username: if0_41420812
        password: ${{ secrets.password }}